<!doctype html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Private Chat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Chats">
        <section class="topbar">
          <div>
            <p class="eyebrow">Firebase Live</p>
            <h1>WH Chat</h1>
          </div>
          <button class="icon-button" id="themeToggle" type="button" aria-label="Theme badle" title="Theme">Mode</button>
        </section>

        <section class="panel">
          <label for="currentUser">Aapki User ID</label>
          <div class="input-row">
            <input id="currentUser" type="text" autocomplete="off" spellcheck="false" placeholder="jaise: goutam" />
            <button id="saveUser" type="button">Save</button>
          </div>
          <p id="identityStatus" class="hint">Firebase connect ho raha hai...</p>
        </section>

        <section class="panel">
          <label for="searchUser">User ID search karein</label>
          <input id="searchUser" type="search" placeholder="Search..." autocomplete="off" spellcheck="false" disabled />
          <div id="searchResults" class="list" aria-live="polite"></div>
        </section>

        <section class="panel chats-panel">
          <div class="section-heading">
            <h2>Chats</h2>
            <span id="chatCount">0</span>
          </div>
          <div id="chatList" class="list"></div>
        </section>
      </aside>

      <section class="chat-pane" aria-label="Private chat">
        <header class="chat-header">
          <button class="back-button" id="backToList" type="button" aria-label="Chats list par wapas">‹</button>
          <div class="avatar" id="activeAvatar">?</div>
          <div>
            <p id="activeName">User search karke chat shuru karein</p>
            <span id="activeMeta">Firebase real-time private thread ready hoga.</span>
          </div>
        </header>

        <div class="privacy-strip">
          <strong>Live</strong>
          <p>Messages Firestore se real time sync hote hain. Production ke liye Firebase Console me security rules zaroor publish karein.</p>
        </div>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="composer">
          <button class="icon-button danger" type="button" id="clearChat" aria-label="Chat clear karein" title="Chat clear karein">Clear</button>
          <input id="messageInput" type="text" placeholder="Message likhein..." autocomplete="off" disabled />
          <button id="sendMessage" type="submit" disabled>Send</button>
        </form>
      </section>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
